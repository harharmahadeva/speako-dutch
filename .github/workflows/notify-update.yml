name: Notify users on update

on:
  push:
    branches: [master]

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version and changelog
        id: info
        run: |
          VERSION=$(grep -o "APP_VERSION='[^']*'" index.html | head -1 | grep -o "'[^']*'" | tr -d "'")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          CHANGELOG=$(awk '/^## \[/{found++} found==1{print} found==2{exit}' CHANGELOG.md | tail -n +2 | sed 's/### /\n/g' | sed 's/^- /• /g')
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send update email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: oranjeraksha@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: sandeepsharma1984@gmail.com
          bcc: oranjeraksha@gmail.com
          from: OranjeRaksha <oranjeraksha@gmail.com>
          subject: "Speako Dutch — Update v${{ steps.info.outputs.version }} is live"
          convert_markdown: false
          html_body: |
            <!DOCTYPE html>
            <html>
            <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
            <body style="margin:0;padding:0;background:#f1f5f9;font-family:Arial,sans-serif;">

              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f1f5f9;padding:40px 0;">
                <tr><td align="center">
                  <table width="580" cellpadding="0" cellspacing="0" border="0" style="max-width:580px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

                    <!-- Header bar -->
                    <tr>
                      <td style="background:#0f172a;padding:28px 36px 24px;">
                        <div style="font-family:'Barlow Condensed',Impact,sans-serif;font-size:32px;font-weight:900;letter-spacing:-1px;line-height:1;margin-bottom:6px;">
                          <span style="color:#e87722;">Oranje</span><span style="color:#f9fafb;">Raksha</span>
                        </div>
                        <div style="font-size:10px;color:#64748b;font-style:italic;letter-spacing:0.3px;">Uw Schild, Onze Belofte &nbsp;·&nbsp; Your Shield, Our Promise</div>
                      </td>
                    </tr>

                    <!-- Orange accent bar -->
                    <tr><td style="background:#e87722;height:4px;font-size:0;">&nbsp;</td></tr>

                    <!-- Body -->
                    <tr>
                      <td style="padding:36px 36px 28px;">

                        <p style="font-size:13px;color:#64748b;margin:0 0 20px 0;text-transform:uppercase;letter-spacing:2px;font-weight:700;">App Update</p>

                        <h1 style="font-size:22px;font-weight:900;color:#0f172a;margin:0 0 6px 0;letter-spacing:-0.5px;">
                          Speako Dutch
                        </h1>
                        <p style="font-size:14px;color:#64748b;margin:0 0 28px 0;">
                          Version <strong style="color:#e87722;">v${{ steps.info.outputs.version }}</strong> is now live.
                        </p>

                        <!-- What's new box -->
                        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f8fafc;border-radius:8px;border-left:4px solid #e87722;margin-bottom:28px;">
                          <tr>
                            <td style="padding:20px 24px;">
                              <p style="font-size:11px;font-weight:700;color:#e87722;text-transform:uppercase;letter-spacing:2px;margin:0 0 12px 0;">What's New</p>
                              <div style="font-size:13px;color:#374151;line-height:1.9;white-space:pre-wrap;">${{ steps.info.outputs.changelog }}</div>
                            </td>
                          </tr>
                        </table>

                        <!-- How to update -->
                        <p style="font-size:11px;font-weight:700;color:#1e3a8a;text-transform:uppercase;letter-spacing:2px;margin:0 0 16px 0;">How to Get the Update</p>

                        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
                          <tr valign="top">
                            <td width="48%" style="background:#f8fafc;border-radius:8px;padding:16px 18px;">
                              <p style="font-size:12px;font-weight:700;color:#0f172a;margin:0 0 8px 0;">&#128241; iPhone (Safari)</p>
                              <p style="font-size:12px;color:#374151;line-height:1.8;margin:0;">
                                1. Open the app and pull down to refresh.<br>
                                2. If unchanged, close Safari fully and reopen.<br>
                                3. If installed on home screen, delete and re-add from Safari.
                              </p>
                            </td>
                            <td width="4%">&nbsp;</td>
                            <td width="48%" style="background:#f8fafc;border-radius:8px;padding:16px 18px;">
                              <p style="font-size:12px;font-weight:700;color:#0f172a;margin:0 0 8px 0;">&#129302; Android (Chrome)</p>
                              <p style="font-size:12px;color:#374151;line-height:1.8;margin:0;">
                                1. Open the app and pull down to refresh.<br>
                                2. If unchanged, tap the three-dot menu and select Refresh.
                              </p>
                            </td>
                          </tr>
                        </table>

                        <p style="font-size:12px;color:#94a3b8;margin:0;">
                          If you have any questions or face any issues, please reply to this email.
                        </p>

                      </td>
                    </tr>

                    <!-- Divider -->
                    <tr><td style="padding:0 36px;"><div style="height:1px;background:#e2e8f0;"></div></td></tr>

                    <!-- Signature -->
                    <tr>
                      <td style="padding:24px 36px 32px;">
                        <table cellpadding="0" cellspacing="0" border="0">
                          <tr>
                            <td style="padding-right:18px;border-right:3px solid #e87722;vertical-align:middle;white-space:nowrap;">
                              <div style="font-family:'Barlow Condensed',Impact,sans-serif;font-size:22px;font-weight:900;letter-spacing:-1px;line-height:1;">
                                <span style="color:#e87722;">Oranje</span><span style="color:#0f172a;">Raksha</span>
                              </div>
                              <div style="font-size:9px;color:#94a3b8;font-style:italic;margin-top:3px;">Uw Schild, Onze Belofte</div>
                            </td>
                            <td style="padding-left:18px;vertical-align:middle;">
                              <div style="font-size:12px;color:#64748b;line-height:1.7;">
                                &#9993;&nbsp; oranjeraksha@gmail.com<br>
                                &#127760;&nbsp; www.oranjeraksha.nl
                              </div>
                            </td>
                          </tr>
                        </table>
                      </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                      <td style="background:#0f172a;padding:14px 36px;text-align:center;">
                        <p style="font-size:10px;color:#374151;margin:0;">
                          You are receiving this because you are a registered Speako user. &nbsp;·&nbsp; &copy; OranjeRaksha
                        </p>
                      </td>
                    </tr>

                  </table>
                </td></tr>
              </table>

            </body>
            </html>
